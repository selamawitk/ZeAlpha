<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B5A00"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="10" fill="url(#gold)"/>
  <g fill="white" transform="translate(24,24)">
    <!-- Bride (left figure with veil) -->
    <ellipse cx="-6" cy="-7" rx="3.5" ry="3.5"/>
    <path d="M-10,-3 Q-6,2 -2,-3" stroke="white" stroke-width="1.5" fill="none"/>
    <rect x="-9" y="-2" width="6" height="8" rx="1.5"/>
    <!-- Veil -->
    <path d="M-9.5,-4 Q-12,-1 -10,2" stroke="white" stroke-width="0.8" fill="none"/>
    <!-- Groom (right figure) -->
    <ellipse cx="6" cy="-7" rx="3.5" ry="3.5"/>
    <rect x="3" y="-2" width="6" height="8" rx="1.5"/>
    <!-- Heart between them -->
    <path d="M0,-1 Q-2,-3 -2,-5 Q-2,-7 0,-7 Q2,-7 2,-5 Q2,-3 0,-1Z" fill="#D4AF37" opacity="0.8"/>
  </g>
</svg>
